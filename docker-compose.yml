version: '3.8'

services:
  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_PORT=8080
      - ENVIRONMENT=development
      - PYTHON_BACKEND_URL=http://backend:8000
      - REDIS_URL=redis://redis:6379/0
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_RPS=100
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=omnirag
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d omnirag"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7.0
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/app
      - huggingface_cache:/app/.cache/huggingface
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=omnirag
      - MONGODB_URL=mongodb://admin:password@mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - QDRANT_HOST=qdrant
      - QDRANT_URL=http://qdrant:6333
      - HF_HOME=/app/.cache/huggingface
      - LIGHTRAG_LLM_MODEL=openai/gpt-4.1-mini
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      qdrant:
        condition: service_started

  celery_worker:
    build: ./backend
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
      - huggingface_cache:/app/.cache/huggingface
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=omnirag
      - MONGODB_URL=mongodb://admin:password@mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - QDRANT_HOST=qdrant
      - QDRANT_URL=http://qdrant:6333
      - HF_HOME=/app/.cache/huggingface
      - LIGHTRAG_LLM_MODEL=openai/gpt-4.1-mini
    depends_on:
      - db
      - mongodb
      - redis
      - minio
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ─────────────────────────────────────────────────────────────────────────
  #   brew install ollama && ollama serve
  #   ollama pull qwen2.5:14b
  # ─────────────────────────────────────────────────────────────────────────
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped
  #   entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull ${LIGHTRAG_LLM_MODEL:-qwen2.5:14b} && wait"]
  #   environment:
  #     - LIGHTRAG_LLM_MODEL=${LIGHTRAG_LLM_MODEL:-qwen2.5:14b}
  #   # Uncomment for NVIDIA GPU:
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           capabilities: [gpu]

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - gateway

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  minio_data:
  qdrant_data:
  huggingface_cache:
  ollama_data:
